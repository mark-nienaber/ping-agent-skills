# Ping Identity docset registry
# One entry per docset that gets a skill. Slug is the skill directory name.
# base_url is the docset root without trailing slash; sync scripts append /llms.txt.
# skill_slug is what ends up at plugins/ping-identity-docs/skills/<slug>/.
# preferred_version pins the latest published version when the docset has numeric versions.
# Use null for unversioned/current docsets; quarterly bump PRs update this field.
# When docs and developer sites share a product name, the developer variant carries -dev suffix.
# enabled=false skips the docset in sync/generate runs — use for staged rollout.

docsets:
