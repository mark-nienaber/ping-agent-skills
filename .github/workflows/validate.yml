name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Python version
        run: python3 --version

      - name: Validate skill structure
        run: scripts/validate.sh --skip-url-check

      - name: Validate sampled live URLs
        run: scripts/validate.sh --url-sample-max 5
